<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Casal Investigador — 50 casos interativos para jogar sozinho ou com amigos. Jogo de investigação criminal, mistério e suspense." />
    <meta name="theme-color" content="#0a0a0a" />
    <meta property="og:title" content="Casal Investigador — 50 Casos Interativos" />
    <meta property="og:description" content="O jogo de investigação definitivo. Jogue sozinho ou com amigos." />
    <meta property="og:type" content="website" />
    <title>Casal Investigador — 50 Casos Interativos</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕵️</text></svg>" />
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕵️</text></svg>" />
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body>
    <!-- YouTube Background Music: Gentleman Dark Blues -->
    <div id="bg-music-container" style="position:fixed;bottom:-9999px;left:-9999px;width:1px;height:1px;overflow:hidden;pointer-events:none;z-index:-9999">
      <iframe id="bg-music-yt" width="1" height="1" 
        src="https://www.youtube.com/embed/e_fJKo19S1s?autoplay=1&loop=1&playlist=e_fJKo19S1s&mute=0&volume=30&controls=0&disablekb=1&playsinline=1&enablejsapi=1"
        title="Background Music" 
        allow="autoplay;encrypted-media" 
        style="border:none">
      </iframe>
    </div>
    <script>
      // BG Music state
      window.__bgMusic = { playing: true, volume: 0.3 };
      function toggleBgMusic() {
        var iframe = document.getElementById('bg-music-yt');
        if (!iframe) return;
        window.__bgMusic.playing = !window.__bgMusic.playing;
        try {
          // YouTube iframe API via postMessage
          iframe.contentWindow.postMessage(
            JSON.stringify({ event: 'command', func: window.__bgMusic.playing ? 'unMute' : 'setVolume', args: [window.__bgMusic.playing ? 30 : 0] }),
            '*'
          );
          if (!window.__bgMusic.playing) {
            iframe.contentWindow.postMessage(JSON.stringify({ event: 'command', func: 'pause', args: [] }), '*');
          } else {
            iframe.contentWindow.postMessage(JSON.stringify({ event: 'command', func: 'playVideo', args: [] }), '*');
          }
        } catch(e) {}
        return window.__bgMusic.playing;
      }
    </script>
    <div id="root">
      <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0a0a0a;color:#c9a84c;font-family:monospace;font-size:14px;flex-direction:column;gap:12px">
        <span style="font-size:40px">🕵️</span>
        <span>Carregando Casal Investigador...</span>
        <span style="color:#666;font-size:11px" id="err-msg"></span>
      </div>
    </div>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        var el = document.getElementById('err-msg')
        if (el) el.textContent = 'Erro: ' + msg + ' (linha ' + line + ')'
        console.error('[Global error]', msg, src, line, err)
        return false
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
